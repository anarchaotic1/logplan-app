<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAFAF8" id="themeColorMeta">
<title>Log/Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF8;--surface:#FFFFFF;--ink:#15161A;--muted:#9A9A93;--line:#EBEAE3;
    --accent:#5B5FEF;--accent-soft:#EEEEFD;--accent-ink:#FFFFFF;
    --flame:#E8894A;--flame-soft:#FCEEE3;
    --radius:14px;--ease:cubic-bezier(.22,1,.36,1);
  }
  [data-theme="dark"]{
    --paper:#0E0F12;--surface:#17181C;--ink:#EDEDE6;--muted:#6C6D72;--line:#232429;
    --accent:#8B8FFF;--accent-soft:#1D1E3A;--accent-ink:#0E0F12;
    --flame:#F0A264;--flame-soft:#2B1F16;
  }
  
  /* Theme Transition Overlay */
  .theme-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9999; clip-path: circle(0% at 50% 50%);
    transition: clip-path 0.4s ease-out; pointer-events: none;
  }
  .theme-overlay.expand { clip-path: circle(150% at 50% 50%); }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  html,body{height:100%;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;overscroll-behavior-y:none;}
  .app{max-width:1240px;margin:0 auto;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 96px);min-height:100%;}
  
  /* Dark Mode Contrast Fix */
  .num { color: inherit; }

  /* ---------- header ---------- */
  header{position:sticky;top:0;z-index:20;background:var(--paper);padding:16px 18px 8px;}
  .h-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .brand{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;letter-spacing:-0.01em;display:flex;align-items:center;gap:9px;}
  .brand span{color:var(--muted);font-weight:400;}
  .orbit-ind{width:16px;height:16px;position:relative;flex-shrink:0;}
  .orbit-ind .ring{position:absolute;inset:0;border:1.4px solid var(--line);border-radius:50%;transition:border-color 0.3s var(--ease);}
  .orbit-ind .core{position:absolute;left:50%;top:50%;width:4px;height:4px;margin:-2px;border-radius:50%;background:var(--muted);transition:background 0.3s var(--ease);}
  .orbit-ind .sat{position:absolute;left:50%;top:-1.6px;width:4.6px;height:4.6px;margin-left:-2.3px;border-radius:50%;background:var(--accent);opacity:0;transform-origin:2.3px 9.6px;}
  .orbit-ind.saving .sat{opacity:1;animation:orbitSpin 0.9s linear infinite;}
  .orbit-ind.saving .ring{border-color:var(--accent-soft);}
  .orbit-ind.saved .core{background:var(--accent);}
  @keyframes orbitSpin{to{transform:rotate(360deg);}}
  .theme-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.25s var(--ease);}
  .theme-btn:active{transform:scale(0.86) rotate(-18deg);}
  .theme-btn svg{width:16px;height:16px;stroke:var(--ink);}

  /* week nav */
  .week-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .wk-arrow{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.18s var(--ease);}
  .wk-arrow:active{transform:scale(0.88);}
  .wk-arrow svg{width:14px;height:14px;stroke:currentColor;}
  .wk-center{flex:1;position:relative;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:7px 12px;text-align:center;cursor:pointer;overflow:hidden;transition:border-color 0.2s var(--ease);}
  .wk-center:active{border-color:var(--accent);}
  .wk-num{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--accent);}
  .wk-range{font-size:11px;color:var(--muted);margin-top:1px;}
  .wk-center input[type=date]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
  .wk-today-btn{font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:0.04em;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:10px;padding:0 10px;height:38px;cursor:pointer;flex-shrink:0;transition:color 0.2s var(--ease),border-color 0.2s var(--ease),transform 0.18s var(--ease);}
  .wk-today-btn:active{transform:scale(0.92);}
  .wk-today-btn.off-week{color:var(--accent);border-color:var(--accent);}

  .week-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .week-strip::-webkit-scrollbar{display:none;}
  .day-pill{flex:1 1 0;min-width:40px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px 9px;border-radius:12px;cursor:pointer;border:none;background:transparent;transition:background 0.25s var(--ease), transform 0.15s var(--ease);}
  .day-pill:active{transform:scale(0.93);}
  .day-pill .dow{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;}
  .day-pill .num{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.3s var(--ease), color 0.3s var(--ease), transform 0.3s var(--ease);}
  .day-pill.today .num{box-shadow:inset 0 0 0 1.5px var(--accent);}
  .day-pill.active{background:var(--accent-soft);}
  .day-pill.active .num{background:var(--accent);color:var(--accent-ink);transform:scale(1.05);}

  /* Global Modal */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:1;transition:opacity 0.2s ease;}
  .modal-overlay.hidden{opacity:0;pointer-events:none;}
  .modal-content{background:var(--surface);padding:2rem;border-radius:12px;max-width:400px;width:90%;text-align:center;}
  .modal-actions{display:flex;justify-content:space-between;margin-top:1.5rem;}
  .btn-danger{background:var(--flame);color:white;border:none;padding:8px 16px;border-radius:8px;}
  .btn-secondary{background:var(--line);border:none;padding:8px 16px;border-radius:8px;}

  /* Daily To-Do List (Replacing Priorities) */
  .todos-container{padding:14px 18px 6px;display:flex;flex-direction:column;gap:6px;}
  .todo-row{display:flex;align-items:center;gap:8px;}
  .todo-check{width:18px;height:18px;cursor:pointer;}
  .todo-text{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;}
  .todo-time{font-size:11px;padding:4px;border:1px solid var(--line);border-radius:6px;width:60px;}
  .todo-bell{background:none;border:none;cursor:pointer;font-size:16px;}
  .todo-bell.active{color:var(--accent);}

  /* Retroactive Habit Tracking */
  .habit-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line);}
  .habit-days{display:flex;gap:4px;}
  .habit-day-toggle{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);cursor:pointer;font-size:10px;}
  .habit-day-toggle.done{background:var(--accent);color:white;border-color:var(--accent);}

  /* (Add remaining styles from your original file here...) */
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <div class="brand">
        <div class="orbit-ind" id="orbitInd"><div class="ring"></div><div class="core"></div><div class="sat"></div></div>
        LOG<span>/PLAN</span>
      </div>
      <button class="theme-btn" id="themeBtn" aria-label="Toggle theme"></button>
    </div>
    <div class="week-nav">
      <button class="wk-arrow" id="wkPrev"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <div class="wk-center" id="wkCenter">
        <div class="wk-num" id="wkNum">W—</div>
        <div class="wk-range" id="wkRange">—</div>
      </div>
      <button class="wk-today-btn" id="wkToday">NOW</button>
      <button class="wk-arrow" id="wkNext"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    <div class="week-strip" id="weekStrip"></div>
  </header>

  <!-- Modal -->
  <div id="delete-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>Delete item?</h3>
      <div class="modal-actions">
        <button id="cancel-delete-btn" class="btn-secondary">Cancel</button>
        <button id="confirm-delete-btn" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <div class="tab-panel active" id="tab-today">
    <div class="todos-container" id="todosList"></div>
    <div id="carouselViewport"><div class="carousel-track" id="carouselTrack"></div></div>
  </div>

  <!-- ... (rest of your existing sections) ... -->
</div>

<script>
/* --- 1. Global Confirmation Modal Logic --- */
function confirmDeletion(callback) {
  const modal = document.getElementById('delete-modal');
  modal.classList.remove('hidden');
  const confirmBtn = document.getElementById('confirm-delete-btn');
  const cancelBtn = document.getElementById('cancel-delete-btn');
  
  const newConfirm = confirmBtn.cloneNode(true);
  confirmBtn.parentNode.replaceChild(newConfirm, confirmBtn);
  
  newConfirm.onclick = () => { callback(); modal.classList.add('hidden'); };
  cancelBtn.onclick = () => { modal.classList.add('hidden'); };
}

/* --- 2. GitHub Backup (Secret Gist) --- */
async function syncToGitHub(data) {
  const token = localStorage.getItem('github_pat');
  if (!token) return;
  let gistId = localStorage.getItem('backup_gist_id');
  const url = gistId ? `https://api.github.com/gists/${gistId}` : 'https://api.github.com/gists';
  const method = gistId ? 'PATCH' : 'POST';
  
  try {
    await fetch(url, {
      method: method,
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        description: "Logplan Backup",
        public: false,
        files: { "logplan.json": { content: JSON.stringify(data) } }
      })
    });
  } catch (e) { console.error("Backup failed", e); }
}

/* --- 3. Optimized Theme Toggle --- */
function toggleTheme(e) {
  const isDark = document.body.classList.contains('dark');
  const overlay = document.createElement('div');
  overlay.className = 'theme-overlay';
  overlay.style.backgroundColor = isDark ? '#ffffff' : '#121212';
  overlay.style.clipPath = `circle(0% at ${e.clientX}px ${e.clientY}px)`;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => {
    overlay.classList.add('expand');
    overlay.style.clipPath = `circle(150% at ${e.clientX}px ${e.clientY}px)`;
  });
  setTimeout(() => { document.body.classList.toggle('dark'); setTimeout(() => overlay.remove(), 100); }, 400);
}

/* --- 4. Retroactive Habit Row --- */
function renderHabitRow(habit) {
  const today = new Date();
  let html = `<div class="habit-row"><span>${habit.name}</span><div class="habit-days">`;
  for (let i = 6; i >= 0; i--) {
    let d = new Date(); d.setDate(today.getDate() - i);
    let iso = d.toISOString().split('T')[0];
    let done = habit.history && habit.history.includes(iso);
    html += `<button class="habit-day-toggle ${done ? 'done' : ''}" onclick="toggleHabit('${habit.id}', '${iso}')">${d.getDate()}</button>`;
  }
  html += `</div></div>`;
  return html;
}

/* --- 5. Orbit Refactor Math --- */
function renderOrbit(totalWeeks, selectedWeekIndex) {
  const nodes = document.querySelectorAll('.week-node');
  nodes.forEach((node, i) => {
    let angle = (((i - selectedWeekIndex) / totalWeeks) * Math.PI * 2) + (Math.PI / 2);
    let x = Math.cos(angle) * 150;
    let y = Math.sin(angle) * 75;
    let depth = (y + 75) / 150;
    node.style.transform = `translate(${x}px, ${y}px) scale(${0.55 + 0.45 * depth})`;
    node.style.opacity = 0.3 + (0.7 * depth);
    node.style.zIndex = Math.round(depth * 100);
  });
}

/* --- Auto-expanding textareas --- */
document.addEventListener('input', e => {
  if (e.target.tagName === 'TEXTAREA') {
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
  }
});

/* (Keep all other original logic below this point) */
</script>
</body>
</html>
