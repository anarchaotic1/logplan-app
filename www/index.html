<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAFAF8" id="themeColorMeta">
<title>Log/Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF8;--surface:#FFFFFF;--ink:#15161A;--muted:#9A9A93;--line:#EBEAE3;
    --accent:#5B5FEF;--accent-soft:#EEEEFD;--accent-ink:#FFFFFF;
    --flame:#E8894A;--flame-soft:#FCEEE3;
    --radius:14px;--ease:cubic-bezier(.22,1,.36,1);
  }
  [data-theme="dark"]{
    --paper:#0E0F12;--surface:#17181C;--ink:#EDEDE6;--muted:#6C6D72;--line:#232429;
    --accent:#8B8FFF;--accent-soft:#1D1E3A;--accent-ink:#0E0F12;
    --flame:#F0A264;--flame-soft:#2B1F16;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  @media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}}
  html,body{height:100%;}
  body{
    margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;
    transition:background 0.35s var(--ease), color 0.35s var(--ease);overscroll-behavior-y:none;
  }
  .app{max-width:1240px;margin:0 auto;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 84px);min-height:100%;}
  input, textarea{font-family:inherit;}

  /* ---------- header ---------- */
  header{position:sticky;top:0;z-index:20;background:var(--paper);padding:18px 18px 8px;transition:background 0.35s var(--ease);}
  .h-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .brand{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;letter-spacing:-0.01em;}
  .brand span{color:var(--muted);font-weight:400;}
  .theme-btn{
    width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--surface);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:transform 0.25s var(--ease), background 0.35s var(--ease), border-color 0.35s var(--ease);
  }
  .theme-btn:active{transform:scale(0.88);}
  .theme-btn svg{width:16px;height:16px;stroke:var(--ink);transition:stroke 0.35s var(--ease);}

  .week-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .week-strip::-webkit-scrollbar{display:none;}
  .day-pill{flex:1 1 0;min-width:40px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px 9px;border-radius:12px;cursor:pointer;border:none;background:transparent;transition:background 0.25s var(--ease), transform 0.15s var(--ease);}
  .day-pill:active{transform:scale(0.93);}
  .day-pill .dow{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;}
  .day-pill .num{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.3s var(--ease), color 0.3s var(--ease), transform 0.3s var(--ease);}
  .day-pill.today .num{box-shadow:inset 0 0 0 1.5px var(--accent);}
  .day-pill.active{background:var(--accent-soft);}
  .day-pill.active .num{background:var(--accent);color:var(--accent-ink);transform:scale(1.05);}

  /* ---------- countdown strip ---------- */
  .countdown-strip{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:10px 18px 6px;}
  .countdown-strip::-webkit-scrollbar{display:none;}
  .cd-chip{
    flex-shrink:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;
    transition:background 0.35s var(--ease), border-color 0.25s var(--ease), transform 0.15s var(--ease);
    opacity:0;transform:scale(0.9);animation:cdIn 0.3s var(--ease) forwards;
  }
  .cd-chip.removing{animation:cdOut 0.16s var(--ease) forwards;}
  @keyframes cdIn{to{opacity:1;transform:scale(1);}}
  @keyframes cdOut{to{opacity:0;transform:scale(0.85);}}
  .cd-chip:active{transform:scale(0.96);}
  .cd-chip.urgent{border-color:var(--accent);background:var(--accent-soft);}
  .cd-chip.past{opacity:0.55;}
  .cd-icon{width:26px;height:26px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cd-chip.urgent .cd-icon{background:var(--accent);}
  .cd-icon svg{width:13px;height:13px;stroke:var(--accent);}
  .cd-chip.urgent .cd-icon svg{stroke:var(--accent-ink);}
  .cd-chip .cd-text{display:flex;flex-direction:column;gap:0;}
  .cd-chip .cd-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;white-space:nowrap;}
  .cd-chip .cd-days{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;color:var(--ink);white-space:nowrap;}
  .cd-chip.urgent .cd-days{color:var(--accent);}
  .cd-chip .cd-del{background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;padding:4px;flex-shrink:0;opacity:0.6;}
  .cd-add{flex-shrink:0;width:38px;height:38px;border-radius:50%;border:1px dashed var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;align-self:center;transition:border-color 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease);}
  .cd-add:active{transform:scale(0.9);}
  .cd-add{flex-shrink:0;width:36px;height:36px;border-radius:50%;border:1px dashed var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;align-self:center;}

  /* ---------- tabs content ---------- */
  .tab-panel{display:none;animation:fadeIn 0.3s var(--ease);}
  .tab-panel.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .priorities{padding:14px 18px 6px;display:flex;flex-direction:column;gap:6px;}
  .priority-row{display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(4px);animation:rowIn 0.3s var(--ease) forwards;}
  .priority-row.removing{animation:rowOut 0.18s var(--ease) forwards;}
  @keyframes rowOut{to{opacity:0;transform:translateY(-4px) scale(0.97);}}
  .priority-row .p-bullet{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .priority-row input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--ink);transition:border-color 0.2s var(--ease), background 0.35s var(--ease);}
  .priority-row input::placeholder{color:var(--muted);}
  .priority-row input:focus{outline:none;border-color:var(--accent);}
  .priority-row .p-del{background:none;border:none;color:var(--muted);cursor:pointer;padding:8px;font-size:13px;flex-shrink:0;}
  .priority-add-btn{display:flex;align-items:center;gap:6px;color:var(--muted);background:none;border:1px dashed var(--line);border-radius:10px;padding:8px 12px;font-size:12.5px;cursor:pointer;align-self:flex-start;transition:border-color 0.2s var(--ease), color 0.2s var(--ease);}
  .priority-add-btn:active{transform:scale(0.97);}
  .priority-add-btn:hover{border-color:var(--accent);color:var(--accent);}

  .carousel-viewport{overflow:hidden;position:relative;touch-action:pan-y;}
  .carousel-track{display:flex;will-change:transform;}
  .day-page{flex:0 0 100%;padding:6px 18px 4px;}

  .hour-row{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-top:1px solid var(--line);opacity:0;transform:translateY(6px);animation:rowIn 0.4s var(--ease) forwards;}
  .hour-row:first-child{border-top:none;}
  @keyframes rowIn{to{opacity:1;transform:none;}}
  .hr-time{width:56px;flex-shrink:0;padding-top:9px;font-family:'Space Grotesk',sans-serif;font-size:11.5px;color:var(--muted);}
  .hr-time.is-now{color:var(--accent);font-weight:600;}
  .hr-body{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
  .field-row{display:flex;align-items:center;gap:8px;}
  .done-dot{width:16px;height:16px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--line);cursor:pointer;position:relative;transition:border-color 0.2s var(--ease), background 0.2s var(--ease);}
  .done-dot::before{content:'';position:absolute;top:50%;left:50%;width:32px;height:32px;transform:translate(-50%,-50%);}
  .done-dot.checked{background:var(--accent);border-color:var(--accent);}
  .done-dot.checked::after{content:'';position:absolute;left:4.5px;top:1.5px;width:4px;height:8px;border:solid var(--accent-ink);border-width:0 1.6px 1.6px 0;transform:rotate(40deg);animation:pop 0.25s var(--ease);}
  @keyframes pop{from{transform:rotate(40deg) scale(0.4);opacity:0;}to{transform:rotate(40deg) scale(1);opacity:1;}}
  .plan-input, .log-input{border:none;background:transparent;font-size:13.5px;padding:3px 2px;width:100%;color:var(--ink);border-radius:6px;transition:background 0.2s var(--ease);}
  .plan-input{border-bottom:1px dashed var(--line);}
  .plan-input:not(:placeholder-shown){border-bottom-color:var(--accent);}
  .plan-input::placeholder{color:var(--muted);font-style:italic;}
  .log-input{font-weight:500;}
  .log-input:not(:placeholder-shown){color:var(--accent);}
  .log-input::placeholder{color:var(--muted);opacity:0.7;}
  .plan-input:focus, .log-input:focus{outline:none;background:var(--accent-soft);}

  .swipe-nav{display:flex;justify-content:space-between;padding:14px 18px 0;}
  .nav-btn{background:var(--surface);border:1px solid var(--line);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:transform 0.2s var(--ease), background 0.35s var(--ease), border-color 0.35s var(--ease);}
  .nav-btn:active{transform:scale(0.9);}
  .nav-btn svg{width:15px;height:15px;stroke:currentColor;}

  .status{padding:16px 18px 0;font-size:10.5px;color:var(--muted);text-align:center;letter-spacing:0.03em;}

  .week-grid{display:none;}
  @media (min-width: 860px){
    .carousel-viewport, .swipe-nav{display:none;}
    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);margin:0 18px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
    .grid-col{border-right:1px solid var(--line);padding:12px 10px 18px;}
    .grid-col:last-child{border-right:none;}
    .grid-col .col-head{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:baseline;gap:6px;}
    .grid-col .col-head .n{color:var(--muted);font-weight:400;}
    .grid-col.today{background:var(--accent-soft);}
    .hour-row{padding:6px 0;}
    .hr-time{width:44px;font-size:10px;padding-top:6px;}
    .plan-input, .log-input{font-size:11.5px;}
  }

  /* ---------- meals ---------- */
  .section-pad{padding:14px 18px 4px;}
  .tag-picker{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .tag-pill{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:11.5px;color:var(--muted);cursor:pointer;transition:background 0.2s var(--ease), border-color 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease);}
  .tag-pill:active{transform:scale(0.95);}
  .tag-pill.selected{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);}
  .meal-add{display:flex;gap:8px;margin-bottom:12px;}
  .meal-add input[type=time]{width:100px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 8px;font-size:13px;color:var(--ink);}
  .meal-add input[type=text]{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--ink);}
  .meal-add button{width:40px;border-radius:10px;border:none;background:var(--accent);color:var(--accent-ink);font-size:18px;cursor:pointer;transition:transform 0.15s var(--ease);}
  .meal-add button:active{transform:scale(0.92);}
  .meal-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);opacity:0;transform:translateY(4px);animation:rowIn 0.3s var(--ease) forwards;}
  .meal-item.removing{animation:rowOut 0.18s var(--ease) forwards;}
  .meal-item:first-of-type{border-top:none;}
  .meal-item .m-time{font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--muted);width:56px;flex-shrink:0;}
  .meal-item .m-mid{flex:1;min-width:0;}
  .meal-item .m-tag{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent);background:var(--accent-soft);border-radius:6px;padding:2px 6px;margin-bottom:2px;}
  .meal-item .m-name{font-size:13.5px;}
  .meal-item .m-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:6px;}
  .empty-hint{color:var(--muted);font-size:12.5px;padding:20px 0;text-align:center;}

  /* ---------- habits ---------- */
  .habit-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line);}
  .habit-row:first-of-type{border-top:none;}
  .habit-toggle{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--line);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.25s var(--ease), border-color 0.25s var(--ease), transform 0.2s var(--ease);}
  .habit-toggle.done{background:var(--flame-soft);border-color:var(--flame);}
  .habit-toggle:active{transform:scale(0.9);}
  .habit-toggle svg{width:17px;height:17px;stroke:var(--flame);opacity:0;transition:opacity 0.2s var(--ease);}
  .habit-toggle.done svg{opacity:1;}
  .habit-info{flex:1;min-width:0;}
  .habit-name{font-size:14px;font-weight:500;}
  .habit-streak{font-size:11.5px;color:var(--muted);margin-top:1px;}
  .habit-streak b{color:var(--flame);font-weight:600;}
  .habit-del{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:8px;}
  .habit-add-row{display:flex;gap:8px;padding:14px 0 4px;}
  .habit-add-row input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--ink);}
  .habit-add-row button{width:40px;border-radius:10px;border:none;background:var(--accent);color:var(--accent-ink);font-size:18px;cursor:pointer;}

  /* ---------- week/reflection ---------- */
  .week-label{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;margin-bottom:10px;}
  .reflect-block{margin-bottom:16px;}
  .reflect-block label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
  .reflect-block textarea{width:100%;min-height:70px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13.5px;color:var(--ink);resize:vertical;transition:border-color 0.2s var(--ease), background 0.35s var(--ease);}
  .reflect-block textarea:focus{outline:none;border-color:var(--accent);}
  .recap-list{list-style:none;padding:0;margin:0;}
  .recap-list li{padding:8px 0;border-top:1px solid var(--line);font-size:12.5px;}
  .recap-list li:first-child{border-top:none;}
  .recap-list .rd{color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:11px;margin-bottom:3px;}

  /* ---------- bottom nav ---------- */
  .bottom-nav{
    position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--surface);
    border-top:1px solid var(--line);display:flex;padding:6px 6px calc(env(safe-area-inset-bottom) + 6px);
    transition:background 0.35s var(--ease), border-color 0.35s var(--ease);
  }
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;background:none;border:none;cursor:pointer;color:var(--muted);border-radius:12px;transition:color 0.2s var(--ease), background 0.2s var(--ease), transform 0.15s var(--ease);}
  .nav-item:active{transform:scale(0.92);}
  .nav-item.active{color:var(--accent);background:var(--accent-soft);}
  .nav-item svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .nav-item span{font-size:10px;font-weight:500;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-row">
      <div class="brand">LOG<span>/PLAN</span></div>
      <button class="theme-btn" id="themeBtn" aria-label="Toggle theme"></button>
    </div>
    <div class="week-strip" id="weekStrip"></div>
  </header>

  <div class="countdown-strip" id="countdownStrip"></div>

  <!-- TODAY TAB -->
  <div class="tab-panel active" id="tab-today">
    <div class="priorities" id="prioritiesBar"></div>
    <div class="swipe-nav">
      <button class="nav-btn" id="prevBtn" aria-label="Previous day"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="nav-btn" id="nextBtn" aria-label="Next day"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>
    <div class="carousel-viewport" id="carouselViewport"><div class="carousel-track" id="carouselTrack"></div></div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="status" id="statusMsg">loading</div>
  </div>

  <!-- MEALS TAB -->
  <div class="tab-panel" id="tab-meals">
    <div class="section-pad">
      <div class="week-label" id="mealsDayLabel">Meals</div>
      <div class="tag-picker" id="tagPicker">
        <button class="tag-pill" data-tag="Breakfast">Breakfast</button>
        <button class="tag-pill" data-tag="Lunch">Lunch</button>
        <button class="tag-pill" data-tag="Dinner">Dinner</button>
        <button class="tag-pill" data-tag="Snack">Snack</button>
      </div>
      <div class="meal-add">
        <input type="time" id="mealTime" value="12:00">
        <input type="text" id="mealName" placeholder="What did you eat?">
        <button id="mealAddBtn">+</button>
      </div>
      <div id="mealEditHint" class="empty-hint" style="display:none;padding:0 0 10px;text-align:left;">Editing entry — <a href="#" id="mealCancelEdit" style="color:var(--accent);">cancel</a></div>
      <div id="mealList"></div>
    </div>
  </div>

  <!-- HABITS TAB -->
  <div class="tab-panel" id="tab-habits">
    <div class="section-pad">
      <div class="week-label">Habits</div>
      <div id="habitList"></div>
      <div class="habit-add-row">
        <input type="text" id="habitName" placeholder="Add a habit (e.g. Gym)">
        <button id="habitAddBtn">+</button>
      </div>
    </div>
  </div>

  <!-- WEEK TAB -->
  <div class="tab-panel" id="tab-week">
    <div class="section-pad">
      <div class="week-label" id="weekRangeLabel">This Week</div>
      <div class="reflect-block">
        <label>What moved the needle</label>
        <textarea id="reflectGood" placeholder="…"></textarea>
      </div>
      <div class="reflect-block">
        <label>What to drop next week</label>
        <textarea id="reflectDrop" placeholder="…"></textarea>
      </div>
      <div class="reflect-block">
        <label>Priorities recap</label>
        <ul class="recap-list" id="recapList"></ul>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item active" data-tab="today"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg><span>Today</span></button>
    <button class="nav-item" data-tab="meals"><svg viewBox="0 0 24 24"><path d="M6 2v8a2 2 0 002 2v10M6 2v8M9 2v8M18 2c-2 1-2 4-2 6s0 4 2 4v10"/></svg><span>Meals</span></button>
    <button class="nav-item" data-tab="habits"><svg viewBox="0 0 24 24"><path d="M12 2c3 4 3 6 1 8 1 0-3 1-3 5a4 4 0 108 0c0-2-1-3-1-3 1 3-1 4-2 3 2-3-1-5-3-13z"/></svg><span>Habits</span></button>
    <button class="nav-item" data-tab="week"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M7 10h10M7 14h6"/></svg><span>Week</span></button>
  </nav>
</div>

<script>
/* ===================== storage: IndexedDB (works standalone / in APK) ===================== */
const DB_NAME='logplan-db', STORE='kv';
function idbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = ()=> req.result.createObjectStore(STORE);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
const storage = {
  async get(key){
    const db = await idbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE,'readonly');
      const req = tx.objectStore(STORE).get(key);
      req.onsuccess = ()=> resolve(req.result!==undefined ? {key,value:req.result} : null);
      req.onerror = ()=> reject(req.error);
    });
  },
  async set(key,value){
    const db = await idbOpen();
    return new Promise((resolve,reject)=>{
      const tx = db.transaction(STORE,'readwrite');
      tx.objectStore(STORE).put(value,key);
      tx.oncomplete = ()=> resolve({key,value});
      tx.onerror = ()=> reject(tx.error);
    });
  }
};

/* ===================== date helpers ===================== */
const START_HOUR=5, END_HOUR=24;
const DOW=['MON','TUE','WED','THU','FRI','SAT','SUN'];
function isoDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;}
function getMonday(d){const date=new Date(d);const day=date.getDay();const diff=(day===0?-6:1)-day;date.setDate(date.getDate()+diff);date.setHours(0,0,0,0);return date;}
function addDays(d,n){const nd=new Date(d);nd.setDate(nd.getDate()+n);return nd;}
function weekKey(m){return `app-week:${isoDate(m)}`;}
function fmtHour(h){const hMod=h%24;const period=hMod<12?'AM':'PM';let hr=hMod%12;if(hr===0)hr=12;return `${hr}${period}`;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function daysBetween(a,b){return Math.round((b-a)/86400000);}

let currentMonday = getMonday(new Date());
let activeIdx = new Date().getDay()===0?6:new Date().getDay()-1;
let weekData = null, dayIsos = [], saveTimer = null;
let habitsData = null, countdownsData = null;

function emptyDay(){const hours={};for(let h=START_HOUR;h<=END_HOUR;h++)hours[h]={plan:'',log:'',done:false};return {priorities:[],hours,meals:[]};}
function emptyWeek(){const days={};for(let i=0;i<7;i++)days[isoDate(addDays(currentMonday,i))]=emptyDay();return {days,reflection:{good:'',drop:''}};}

async function loadWeek(){
  setStatus('loading');
  const key = weekKey(currentMonday);
  try{ const res = await storage.get(key); weekData = res ? JSON.parse(res.value) : emptyWeek(); }
  catch(e){ weekData = emptyWeek(); }
  dayIsos = [];
  for(let i=0;i<7;i++){
    const k = isoDate(addDays(currentMonday,i));
    dayIsos.push(k);
    if(!weekData.days[k]) weekData.days[k] = emptyDay();
    const day = weekData.days[k];
    if(!day.priorities){
      if(Array.isArray(day.top3)) day.priorities = day.top3.filter(t=>t&&t.trim()).map(t=>({id:'p'+Date.now()+Math.random().toString(36).slice(2,5), text:t}));
      else day.priorities = [];
      delete day.top3;
    }
    if(!day.hours) day.hours = {};
    if(!day.meals) day.meals = [];
    for(let h=START_HOUR;h<=END_HOUR;h++) if(!day.hours[h]) day.hours[h] = {plan:'',log:'',done:false};
  }
  if(!weekData.reflection) weekData.reflection = {good:'',drop:''};
  renderAll();
  setStatus('saved');
}
function scheduleSave(){
  setStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ const r = await storage.set(weekKey(currentMonday), JSON.stringify(weekData)); setStatus(r?'saved':'save failed'); }
    catch(e){ setStatus('save failed'); }
  }, 350);
}
function setStatus(m){ const el=document.getElementById('statusMsg'); if(el) el.textContent = m; }
function currentHour(){ const n=new Date(); return n.getHours()===0?24:n.getHours(); }

function hourRowsHTML(iso){
  const nowH = currentHour();
  const isToday = iso === isoDate(new Date());
  let html='', i=0;
  for(let h=START_HOUR; h<=END_HOUR; h++){
    const e = weekData.days[iso].hours[h];
    const isNow = isToday && h===nowH;
    html += `<div class="hour-row" style="animation-delay:${Math.min(i*14,200)}ms">
        <div class="hr-time${isNow?' is-now':''}">${fmtHour(h)}</div>
        <div class="hr-body">
          <div class="field-row">
            <div class="done-dot${e.done?' checked':''}" data-day="${iso}" data-hour="${h}"></div>
            <input class="plan-input" placeholder="plan" data-day="${iso}" data-hour="${h}" data-field="plan" value="${esc(e.plan)}">
          </div>
          <input class="log-input" placeholder="log" data-day="${iso}" data-hour="${h}" data-field="log" value="${esc(e.log)}">
        </div></div>`;
    i++;
  }
  return html;
}
function wireHourInputs(root){
  root.querySelectorAll('.plan-input, .log-input').forEach(inp=>{
    inp.addEventListener('input', e=>{ const {day,hour,field}=e.target.dataset; weekData.days[day].hours[hour][field]=e.target.value; scheduleSave(); });
  });
  root.querySelectorAll('.done-dot').forEach(dot=>{
    dot.addEventListener('click', e=>{
      const {day,hour}=e.target.dataset; const cur=weekData.days[day].hours[hour];
      cur.done = !cur.done; e.target.classList.toggle('checked', cur.done); scheduleSave();
    });
  });
}

let dragStartX=null, dragDelta=0, trackWidth=0;
function renderCarousel(){
  const track = document.getElementById('carouselTrack');
  track.innerHTML = dayIsos.map(iso => `<div class="day-page">${hourRowsHTML(iso)}</div>`).join('');
  wireHourInputs(track);
  positionTrack(false);
  attachDrag();
}
function positionTrack(animate){
  const track = document.getElementById('carouselTrack');
  const vp = document.getElementById('carouselViewport');
  trackWidth = vp.clientWidth;
  track.style.transition = animate ? 'transform 0.38s var(--ease)' : 'none';
  track.style.transform = `translateX(${-activeIdx*trackWidth}px)`;
}
function attachDrag(){
  const vp = document.getElementById('carouselViewport');
  const track = document.getElementById('carouselTrack');
  vp.onpointerdown = e=>{
    if(e.target.tagName==='INPUT') return;
    dragStartX=e.clientX; dragDelta=0; track.style.transition='none'; vp.setPointerCapture(e.pointerId);
  };
  vp.onpointermove = e=>{
    if(dragStartX===null) return;
    dragDelta = e.clientX - dragStartX;
    track.style.transform = `translateX(${-activeIdx*trackWidth + dragDelta}px)`;
  };
  const end = ()=>{
    if(dragStartX===null) return;
    if(dragDelta<-60 && activeIdx<6) activeIdx++;
    else if(dragDelta>60 && activeIdx>0) activeIdx--;
    dragStartX=null; dragDelta=0; positionTrack(true);
    renderWeekStrip(); renderPriorities();
    if(document.getElementById('tab-meals').classList.contains('active')) renderMeals();
  };
  vp.onpointerup=end; vp.onpointercancel=end;
}
function goToDay(i){
  activeIdx=i; positionTrack(true); renderWeekStrip(); renderPriorities();
  if(document.getElementById('tab-meals').classList.contains('active')) renderMeals();
}
document.getElementById('prevBtn').addEventListener('click', ()=>{ if(activeIdx>0) goToDay(activeIdx-1); });
document.getElementById('nextBtn').addEventListener('click', ()=>{ if(activeIdx<6) goToDay(activeIdx+1); });
window.addEventListener('resize', ()=>positionTrack(false));

function renderGrid(){

  }).join('');
  wireHourInputs(grid);
}

let editingMealId = null;
let selectedTag = 'Lunch';
function defaultTagForTime(t){
  const h = parseInt(t.split(':')[0],10);
  if(h < 11) return 'Breakfast';
  if(h < 16) return 'Lunch';
  if(h < 21) return 'Dinner';
  return 'Snack';
}
function setSelectedTag(tag){
  selectedTag = tag;
  document.querySelectorAll('.tag-pill').forEach(p=>p.classList.toggle('selected', p.dataset.tag===tag));
}
document.querySelectorAll('.tag-pill').forEach(p=>{

});
document.getElementById('mealTime').addEventListener('change', e=>{
  if(!editingMealId) setSelectedTag(defaultTagForTime(e.target.value));
});
setSelectedTag(defaultTagForTime(document.getElementById('mealTime').value));

function renderMeals(){
  const iso = dayIsos[activeIdx];

  document.getElementById('mealsDayLabel').textContent = `Meals · ${DOW[activeIdx]} ${d.getDate()}`;

    <div class="meal-item" data-row="${m.id}">
      <div class="m-time" data-edit="${m.id}">${fmtTime12(m.time)}</div>
      <div class="m-mid" data-edit="${m.id}"><span class="m-tag">${esc(m.tag||'Meal')}</span><div class="m-name">${esc(m.name)}</div></div>
      <button class="m-del" data-id="${m.id}">✕</button>
    </div>`).join('');
  list.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click', ()=>startEditMeal(el.dataset.edit));
  });
  list.querySelectorAll('.m-del').forEach(b=>{

      e.stopPropagation();
      if(!confirm('Delete this entry?')) return;
      const row = list.querySelector(`[data-row="${b.dataset.id}"]`);
      row.classList.add('removing');
      setTimeout(()=>{
        weekData.days[iso].meals = weekData.days[iso].meals.filter(m=>m.id!==b.dataset.id);

      }, 170);

function startEditMeal(id){
  const iso = dayIsos[activeIdx];
  const m = weekData.days[iso].meals.find(x=>x.id===id);
  if(!m) return;
  editingMealId = id;
  document.getElementById('mealTime').value = m.time;
  document.getElementById('mealName').value = m.name;
  setSelectedTag(m.tag || 'Lunch');
  document.getElementById('mealAddBtn').textContent = '✓';
  document.getElementById('mealEditHint').style.display = 'block';
  document.getElementById('mealName').focus();
}
function cancelMealEdit(){
  editingMealId = null;
  document.getElementById('mealTime').value = '12:00';
  document.getElementById('mealName').value = '';
  setSelectedTag(defaultTagForTime('12:00'));
  document.getElementById('mealAddBtn').textContent = '+';
  document.getElementById('mealEditHint').style.display = 'none';
}
document.getElementById('mealCancelEdit').addEventListener('click', e=>{ e.preventDefault(); cancelMealEdit(); });
function fmtTime12(t){ const [h,m]=t.split(':').map(Number); const period=h<12?'AM':'PM'; let hr=h%12; if(hr===0)hr=12; return `${hr}:${String(m).padStart(2,'0')}${period}`; }
document.getElementById('mealAddBtn').addEventListener('click', ()=>{
  const time = document.getElementById('mealTime').value || '12:00';
  const name = document.getElementById('mealName').value.trim();
  if(!name) return;
  const iso = dayIsos[activeIdx];
  const clash = weekData.days[iso].meals.find(m => m.time===time && m.id!==editingMealId);
  if(clash && !confirm(`You already logged "${clash.name}" at this time. Add anyway?`)) return;
  if(editingMealId){
    const m = weekData.days[iso].meals.find(x=>x.id===editingMealId);
    if(m){ m.time = time; m.name = name; m.tag = selectedTag; }
    cancelMealEdit();
  } else {
    weekData.days[iso].meals.push({id: Date.now()+'-'+Math.random().toString(36).slice(2,6), time, name, tag: selectedTag});
    document.getElementById('mealName').value = '';
  }
  scheduleSave(); renderMeals();
});

/* ===================== habits ===================== */
async function loadHabits(){
  try{
    const res = await storage.get('app-habits');
    habitsData = res ? JSON.parse(res.value) : { habits:[{id:'gym',name:'Gym'},{id:'bball',name:'Basketball'}], log:{} };
  }catch(e){ habitsData = { habits:[{id:'gym',name:'Gym'},{id:'bball',name:'Basketball'}], log:{} }; }
}
function saveHabits(){ storage.set('app-habits', JSON.stringify(habitsData)).catch(()=>{}); }
function habitStreak(id){
  let streak=0; let d = new Date(); let iso = isoDate(d);
  const doneToday = habitsData.log[iso] && habitsData.log[iso][id];
  if(!doneToday) d = addDays(d,-1);
  while(true){
    const k = isoDate(d);
    if(habitsData.log[k] && habitsData.log[k][id]){ streak++; d = addDays(d,-1); }
    else break;
  }
  return streak;
}
function renderHabits(){
  const list = document.getElementById('habitList');
  const todayIso = isoDate(new Date());
  const todayLog = habitsData.log[todayIso] || {};
  list.innerHTML = habitsData.habits.map(h=>{
    const done = !!todayLog[h.id];
    const streak = habitStreak(h.id);
    return `<div class="habit-row">
      <div class="habit-toggle${done?' done':''}" data-id="${h.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c3 4 3 6 1 8 1 0-3 1-3 5a4 4 0 108 0c0-2-1-3-1-3 1 3-1 4-2 3 2-3-1-5-3-13z"/></svg>
      </div>
      <div class="habit-info">
        <div class="habit-name" data-rename="${h.id}">${esc(h.name)}</div>
        <div class="habit-streak">${streak>0?`<b>${streak}</b> day streak`:'no streak yet'}</div>
      </div>
      <button class="habit-del" data-del="${h.id}">✕</button>
    </div>`;
  }).join('');
  list.querySelectorAll('.habit-toggle').forEach(t=>{
    t.addEventListener('click', ()=>{
      const id = t.dataset.id;
      if(!habitsData.log[todayIso]) habitsData.log[todayIso] = {};
      habitsData.log[todayIso][id] = !habitsData.log[todayIso][id];
      saveHabits(); renderHabits();
    });
  });
  list.querySelectorAll('[data-rename]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const h = habitsData.habits.find(x=>x.id===el.dataset.rename);
      const name = prompt('Rename habit', h.name);
      if(!name || !name.trim()) return;
      if(isDuplicateHabit(name, h.id)){ alert('You already have a habit with that name.'); return; }
      h.name = name.trim(); saveHabits(); renderHabits();
    });
  });
  list.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const h = habitsData.habits.find(x=>x.id===b.dataset.del);
      if(h && confirm(`Delete "${h.name}"? Its streak history will remain stored but hidden.`)){
        habitsData.habits = habitsData.habits.filter(x=>x.id!==b.dataset.del);
        saveHabits(); renderHabits();
      }
    });
  });
}
function isDuplicateHabit(name, excludeId){
  return habitsData.habits.some(h => h.id!==excludeId && h.name.trim().toLowerCase()===name.trim().toLowerCase());
}
document.getElementById('habitAddBtn').addEventListener('click', ()=>{
  const name = document.getElementById('habitName').value.trim();
  if(!name) return;
  if(isDuplicateHabit(name, null)){ alert('You already have a habit with that name.'); return; }
  habitsData.habits.push({id:'h'+Date.now(), name});
  document.getElementById('habitName').value = '';
  saveHabits(); renderHabits();
});

async function loadCountdowns(){
  try{
    const res = await storage.get('app-countdowns');
    countdownsData = res ? JSON.parse(res.value) : [{id:'dmat', label:'dMAT test', date:'2026-09-26'}];

function saveCountdowns(){ storage.set('app-countdowns', JSON.stringify(countdownsData)).catch(()=>{}); }
function renderCountdowns(){
  const strip = document.getElementById('countdownStrip');
  const today = new Date(); today.setHours(0,0,0,0);
  strip.innerHTML = countdownsData.map(c=>{
    const target = new Date(c.date+'T00:00:00');
    const n = daysBetween(today, target);
    const txt = n>0 ? `${n} day${n===1?'':'s'}` : n===0 ? 'Today' : `${Math.abs(n)}d ago`;
    const urgent = n>=0 && n<=7;
    const past = n<0;
    return `<div class="cd-chip${urgent?' urgent':''}${past?' past':''}" data-id="${c.id}">
      <div class="cd-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg></div>
      <div class="cd-text" data-edit="${c.id}"><span class="cd-label">${esc(c.label)}</span><span class="cd-days">${txt}</span></div>
      <button class="cd-del" data-del="${c.id}">✕</button>
    </div>`;
  }).join('') + `<button class="cd-add" id="cdAddBtn">+</button>`;
  document.getElementById('cdAddBtn').addEventListener('click', ()=>editCountdown(null));
  strip.querySelectorAll('[data-edit]').forEach(el=>{
    el.addEventListener('click', ()=>editCountdown(el.dataset.edit));
  });
  strip.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const c = countdownsData.find(x=>x.id===btn.dataset.del);
      if(c && confirm(`Delete "${c.label}"?`)){
        const chip = strip.querySelector(`.cd-chip[data-id="${btn.dataset.del}"]`);
        chip.classList.add('removing');
        setTimeout(()=>{
          countdownsData = countdownsData.filter(x=>x.id!==btn.dataset.del);
          saveCountdowns(); renderCountdowns();
        }, 150);
      }
    });
  });
}
function isDuplicateCountdown(label, date, excludeId){
  return countdownsData.some(c => c.id!==excludeId && c.label.trim().toLowerCase()===label.trim().toLowerCase() && c.date===date);
}
function editCountdown(id){
  const existing = id ? countdownsData.find(c=>c.id===id) : null;
  const label = prompt('Countdown label (e.g. IELTS exam)', existing ? existing.label : '');
  if(!label || !label.trim()) return;
  const date = prompt('Date (YYYY-MM-DD)', existing ? existing.date : '');
  if(!date || !/^\d{4}-\d{2}-\d{2}$/.test(date) || isNaN(new Date(date+'T00:00:00'))){
    alert('Enter a valid date as YYYY-MM-DD.'); return;
  }
  if(isDuplicateCountdown(label, date, existing?existing.id:null)){
    alert('A countdown with that label and date already exists.'); return;
  }
  if(existing){ existing.label = label.trim(); existing.date = date; }
  else{ countdownsData.push({id:'c'+Date.now(), label:label.trim(), date}); }
  saveCountdowns(); renderCountdowns();
}

/* ===================== theme ===================== */
function iconMoon(){return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"/></svg>`;}
function iconSun(){return `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;}
function applyTheme(t){
  const btn=document.getElementById('themeBtn'); const meta=document.getElementById('themeColorMeta');
  if(t==='dark'){ document.documentElement.setAttribute('data-theme','dark'); btn.innerHTML=iconSun(); meta.setAttribute('content','#0E0F12'); }
  else{ document.documentElement.removeAttribute('data-theme'); btn.innerHTML=iconMoon(); meta.setAttribute('content','#FAFAF8'); }
}
document.getElementById('themeBtn').addEventListener('click', async ()=>{
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const next = isDark?'light':'dark'; applyTheme(next);
  try{ await storage.set('app-theme-pref', next); }catch(e){}
});

/* ===================== Android back button (active once wrapped in Capacitor) ===================== */
function currentActiveTab(){
  const el = document.querySelector('.tab-panel.active');
  return el ? el.id.replace('tab-','') : 'today';
}
if(window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App){
  window.Capacitor.Plugins.App.addListener('backButton', ()=>{
    if(currentActiveTab() !== 'today'){ switchTab('today'); }
    else { window.Capacitor.Plugins.App.minimizeApp(); }
  });
}

/* ===================== init ===================== */
(async function init(){
  try{ const res = await storage.get('app-theme-pref'); applyTheme(res?res.value:'light'); }catch(e){ applyTheme('light'); }
  await loadHabits();
  await loadCountdowns();
  await loadWeek();
})();
</script>
</body>
</html>
